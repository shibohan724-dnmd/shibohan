<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #000; }

  .stage {
    position: relative;
    width: 1600px;
    height: 900px;
    overflow: hidden;
    background: #080605;
    font-family: "Inter", system-ui, sans-serif;
    color: #f3ece0;
  }

  /* 产品主视觉：偏右铺满 */
  .visual {
    position: absolute;
    top: 51%; right: 20px;
    transform: translateY(-50%);
    width: 1060px;
    z-index: 1;
  }
  .visual img { width: 100%; display: block; }

  /* 左侧加深，保证文字可读 + 暖色氛围光 */
  .stage::before {
    content: "";
    position: absolute; inset: 0; z-index: 2; pointer-events: none;
    background:
      radial-gradient(120% 90% at 78% 52%, rgba(150,96,40,0.16), transparent 55%),
      linear-gradient(90deg, #080605 30%, rgba(8,6,5,0.86) 46%, rgba(8,6,5,0.15) 66%, transparent 78%);
  }
  /* 胶片颗粒 + 暗角 */
  .stage::after {
    content: "";
    position: absolute; inset: 0; z-index: 5; pointer-events: none;
    background-image: radial-gradient(rgba(255,255,255,0.025) 0.5px, transparent 0.5px);
    background-size: 3px 3px;
    box-shadow: inset 0 0 220px 60px rgba(0,0,0,0.75);
    mix-blend-mode: screen;
    opacity: .5;
  }

  /* 文案 */
  .copy {
    position: absolute;
    left: 110px; top: 50%;
    transform: translateY(-50%);
    z-index: 4;
    width: 620px;
  }
  .kicker {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: #c79a6e;
    margin-bottom: 30px;
    padding-left: 4px;
  }
  .brand {
    font-family: "Cormorant Garamond", serif;
    font-weight: 500;
    font-size: 168px;
    line-height: 0.86;
    letter-spacing: 0.06em;
    color: #f6efe4;
    margin-left: -4px;
  }
  .tagline {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-weight: 400;
    font-size: 40px;
    color: #e7c6a0;
    margin-top: 18px;
    letter-spacing: 0.01em;
  }
  .desc {
    font-size: 17px;
    font-weight: 300;
    line-height: 1.7;
    color: #b9ad9f;
    margin-top: 30px;
    max-width: 430px;
  }
  .meta {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-top: 40px;
  }
  .meta .bar { width: 54px; height: 1px; background: #6e5b46; }
  .meta span {
    font-size: 13px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #8c7d6c;
  }

  /* 右下署名 */
  .sign {
    position: absolute;
    right: 56px; bottom: 44px;
    z-index: 4;
    font-size: 13px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: #7c6e5d;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="visual"><img src="assets/case3/dark-hero.jpg" alt="KOVA" /></div>

    <div class="copy">
      <div class="kicker">Brand Identity &middot; E-commerce</div>
      <div class="brand">KOVA</div>
      <div class="tagline">Brew it cold.</div>
      <p class="desc">为冷萃咖啡品牌打造的官网与在线商城——从品牌叙事到下单复购的完整体验设计。</p>
      <div class="meta"><span class="bar"></span><span>Case Study — 2026</span></div>
    </div>

    <div class="sign">施博瀚 · Portfolio</div>
  </div>
</body>
</html>
